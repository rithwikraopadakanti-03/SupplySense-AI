version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: supplysense_postgres
    environment:
      POSTGRES_DB: supplysense
      POSTGRES_USER: supplysense_user
      POSTGRES_PASSWORD: supplysense_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U supplysense_user -d supplysense"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: supplysense_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: supplysense_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://supplysense_user:supplysense_pass@postgres:5432/supplysense
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=your-secret-key-change-in-production-min-32-chars
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - ENVIRONMENT=development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: supplysense_celery
    environment:
      - DATABASE_URL=postgresql+asyncpg://supplysense_user:supplysense_pass@postgres:5432/supplysense
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=your-secret-key-change-in-production-min-32-chars
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    depends_on:
      - redis
      - postgres
    volumes:
      - ./backend:/app
    command: celery -A app.tasks.celery_app worker --loglevel=info

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: supplysense_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      - backend

volumes:
  postgres_data:
